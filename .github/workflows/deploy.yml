name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build e push da imagem (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — forummunicipal
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/seme-tucano/forummunicipal:latest
            ghcr.io/seme-tucano/forummunicipal:${{ github.sha }}
          cache-from: type=gha,scope=forum
          cache-to: type=gha,scope=forum,mode=max

  deploy:
    name: Deploy produção
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 15m
          envs: GHCR_TOKEN
          script: |
            set -e

            DEPLOY_DIR="/home/seme/forummunicipal"
            echo ">>> DEPLOY PRODUÇÃO — forummunicipal"

            # Sincroniza o código-fonte (referência local; build é feito no Actions)
            GH_TOKEN=$(gh auth token)
            cd "$DEPLOY_DIR/app"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/seme-tucano/forummunicipal.git"
            git fetch origin
            git reset --hard origin/main
            git remote set-url origin "https://github.com/seme-tucano/forummunicipal.git"

            # Pull da imagem pronta (build feito no Actions) e restart
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            cd "$DEPLOY_DIR"
            docker compose pull
            docker compose up -d
            docker logout ghcr.io

            echo "✅ Deploy concluído — forummunicipal"
