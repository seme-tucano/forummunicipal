name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: BRANCH
          script: |
            set -e

            if [ "$BRANCH" = "main" ]; then
              DEPLOY_DIR="/home/seme/forummunicipal"
              echo ">>> DEPLOY PRODUCAO"
            else
              DEPLOY_DIR="/home/seme/forummunicipal-hml"
              echo ">>> DEPLOY HOMOLOGACAO"
            fi

            GH_TOKEN=$(gh auth token)
            cd "$DEPLOY_DIR/app"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/seme-tucano/forummunicipal.git"
            git fetch origin
            git reset --hard "origin/$BRANCH"
            git remote set-url origin "https://github.com/seme-tucano/forummunicipal.git"

            cd "$DEPLOY_DIR"
            docker compose build --no-cache
            docker compose up -d

            echo "Deploy concluido — branch: $BRANCH"
